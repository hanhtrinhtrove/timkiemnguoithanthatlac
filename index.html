<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tìm Kiếm Người Thân Thất Lạc - Miễn Phí</title>
    <style>
        :root { --primary: #2c3e50; --red-btn: #e74c3c; --green-btn: #27ae60; --blue-btn: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f5f6fa; color: #333; line-height: 1.6; }
        header { background: var(--primary); color: white; text-align: center; padding: 30px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        header p { margin: 10px 0 0 0; font-size: 16px; opacity: 0.9; }
        .container { max-width: 900px; margin: 30px auto; padding: 20px; }
        
        .action-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .btn-main { padding: 30px 20px; text-align: center; font-size: 22px; font-weight: bold; color: white; text-decoration: none; border-radius: 12px; cursor: pointer; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.2s; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .btn-find { background-color: var(--red-btn); }
        .btn-lost { background-color: var(--green-btn); }
        @media (max-width: 600px) { .action-buttons { grid-template-columns: 1fr; } }

        .form-section { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: none; margin-bottom: 40px; }
        .form-section.active { display: block; animation: fadeIn 0.5s; }
        .form-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 3px solid #eee; }
        .form-title.find { color: var(--red-btn); border-bottom-color: var(--red-btn); }
        .form-title.lost { color: var(--green-btn); border-bottom-color: var(--green-btn); }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 16px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        
        .btn-submit { width: 100%; padding: 15px; background: var(--blue-btn); color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background: #1f6b9c; }

        .match-alert { background: #fff3cd; border-left: 6px solid #ffc107; color: #856404; padding: 20px; border-radius: 8px; margin-bottom: 30px; display: none; }
        .match-alert h3 { margin-top: 0; color: #b7791f; }

        .list-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .list-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: var(--primary); }
        .card-container { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { padding: 15px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; position: relative; }
        .badge { position: absolute; top: 15px; right: 15px; padding: 5px 10px; border-radius: 20px; color: white; font-size: 12px; font-weight: bold; }
        .badge.find { background: var(--red-btn); }
        .badge.lost { background: var(--green-btn); }
        .card h4 { margin: 0 0 10px 0; font-size: 18px; color: #2c3e50; }
        .card p { margin: 5px 0; font-size: 15px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <h1>TÌM KIẾM NGƯỜI THÂN LY TÁN</h1>
        <p>Hệ thống kết nối tự động - Hoàn toàn miễn phí vì cộng đồng</p>
    </header>

    <div class="container">
        <div id="matchAlert" class="match-alert">
            <h3>🔔 HỆ THỐNG PHÁT HIỆN THÔNG TIN TRÙNG KHỚP!</h3>
            <div id="matchDetails"></div>
        </div>

        <div class="action-buttons">
            <button class="btn-main btn-find" onclick="showForm('find')">🔴 TÔI MUỐN ĐĂNG TIN<br><span style="font-size:14px; font-weight:normal;">(Đi tìm người thân bị thất lạc)</span></button>
            <button class="btn-main btn-lost" onclick="showForm('lost')">🟢 TÔI LÀ NGƯỜI THẤT LẠC<br><span style="font-size:14px; font-weight:normal;">(Muốn tìm lại gia đình gốc)</span></button>
        </div>

        <div id="formSection" class="form-section">
            <div id="formTitle" class="form-title"></div>
            <form id="searchForm" onsubmit="submitForm(event)">
                <input type="hidden" id="formType">
                <div class="form-group">
                    <label>Họ và tên người cần tìm / người thất lạc <span style="color:red">*</span></label>
                    <input type="text" id="fullname" placeholder="Ví dụ: Nguyễn Văn An" required>
                </div>
                <div class="form-group">
                    <label>Quê quán hoặc Nơi thất lạc (Tỉnh/Thành phố) <span style="color:red">*</span></label>
                    <select id="province" required>
                        <option value="">-- Chọn Tỉnh / Thành Phố --</option>
                        <option value="Hà Nội">Hà Nội</option>
                        <option value="TP Hồ Chí Minh">TP Hồ Chí Minh</option>
                        <option value="Đà Nẵng">Đà Nẵng</option>
                        <option value="Quảng Nam">Quảng Nam</option>
                        <option value="Khác">Tỉnh thành khác...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Năm sinh (Có thể điền năm sinh gần đúng) <span style="color:red">*</span></label>
                    <input type="number" id="birthyear" placeholder="Ví dụ: 1988" min="1930" max="2026" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại liên hệ (Hệ thống sẽ bảo mật tin này) <span style="color:red">*</span></label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại để nhận thông báo" required>
                </div>
                <div class="form-group">
                    <label>Mô tả thêm đặc điểm hoặc hoàn cảnh</label>
                    <textarea id="description" rows="3" placeholder="Ví dụ: Thất lạc tại ga tàu, có nốt ruồi dưới mắt..."></textarea>
                </div>
                <button type="submit" class="btn-submit">GỬI TIN VÀ CHẠY ĐỐI CHIẾU HỆ THỐNG</button>
            </form>
        </div>

        <div class="list-section">
            <div class="list-title">Danh Sách Tin Đăng Gần Đây</div>
            <div id="cardContainer" class="card-container">
                <div class="card">
                    <span class="badge find">Tìm Người</span>
                    <h4>Người cần tìm: Nguyễn Văn An</h4>
                    <p><strong>Nơi thất lạc:</strong> Quảng Nam</p>
                    <p><strong>Năm sinh:</strong> 1988</p>
                    <p><strong>Hoàn cảnh:</strong> Thất lạc từ nhỏ tại ga tàu lửa.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let database = [{ type: 'find', name: 'nguyen van an', province: 'Quảng Nam', year: 1988, phone: '0905-XXX-XXX (Người tìm đang đợi)', desc: 'Thất lạc từ nhỏ tại ga tàu lửa.' }];
        function showForm(type) {
            const section = document.getElementById('formSection');
            const title = document.getElementById('formTitle');
            document.getElementById('formType').value = type;
            section.classList.add('active');
            if(type === 'find') {
                title.textContent = "🔴 FORM ĐĂNG TIN TÌM NGƯỜI THÂN";
                title.className = "form-title find";
            } else {
                title.textContent = "🟢 FORM ĐĂNG TIN TÔI LÀ NGƯỜI THẤT LẠC";
                title.className = "form-title lost";
            }
            section.scrollIntoView({ behavior: 'smooth' });
        }
        function removeSign(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }
        function submitForm(event) {
            event.preventDefault();
            const type = document.getElementById('formType').value;
            const name = document.getElementById('fullname').value;
            const province = document.getElementById('province').value;
            const year = parseInt(document.getElementById('birthyear').value);
            const phone = document.getElementById('phone').value;
            const desc = document.getElementById('description').value;

            let hasMatch = false;
            let matchInfo = "";

            database.forEach(item => {
                if (item.type !== type && removeSign(item.name) === removeSign(name) && item.province === province && Math.abs(item.year - year) <= 2) {
                    hasMatch = true;
                    matchInfo = `Chúng tôi tìm thấy thông tin trùng khớp rất cao: <br>
                    - <strong>Họ tên:</strong> ${item.name.toUpperCase()} <br>
                    - <strong>Nơi thất lạc:</strong> ${item.province} (Năm sinh: ${item.year}) <br>
                    - <strong>Ghi chú:</strong> ${item.desc} <br>
                    - <strong>Thông tin liên hệ:</strong> <span style="color:blue; font-weight:bold;">${item.phone}</span><br>
                    Hệ thống đã kết nối thành công hai hồ sơ!`;
                }
            });

            if (hasMatch) {
                document.getElementById('matchDetails').innerHTML = matchInfo;
                const alertBox = document.getElementById('matchAlert');
                alertBox.style.display = 'block';
                alertBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Đăng tin thành công! Hệ thống chưa tìm thấy người trùng khớp lúc này. Tin của bạn đã được lưu lại để đối chiếu tự động với những người đăng sau.");
                document.getElementById('matchAlert').style.display = 'none';
            }

            database.push({ type, name, province, year, phone, desc });
            const cardContainer = document.getElementById('cardContainer');
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.innerHTML = `<span class="badge ${type}">${type === 'find' ? 'Tìm Người' : 'Thất Lạc'}</span><h4>Người cần tìm: ${name}</h4><p><strong>Nơi thất lạc:</strong> ${province}</p><p><strong>Năm sinh:</strong> ${year}</p><p><strong>Hoàn cảnh:</strong> ${desc ? desc : 'Không có mô tả chi tiết.'}</p>`;
            cardContainer.insertBefore(newCard, cardContainer.firstChild);
            document.getElementById('searchForm').reset();
            document.getElementById('formSection').classList.remove('active');
        }
    </script>
</body>
</html>
